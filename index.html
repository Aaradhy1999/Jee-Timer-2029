<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE 2029 Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="timer">
        <h1>MISSION JEE 2029 by Aaradhy Agarwal</h1>
        <div class="lineA">Countdown to the Ultimate Target. Date : January 1 , 2029</div>
        
        <div class="countdown-box">
            <div class="time"><span id="months">00</span><p>Months</p></div>
            <div class="time"><span id="days">00</span><p>Days</p></div>
            <div class="time"><span id="hours">00</span><p>Hours</p></div>
            <div class="time"><span id="minutes">00</span><p>Minutes</p></div>
            <div class="time"><span id="seconds">00</span><p>Seconds</p></div>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
